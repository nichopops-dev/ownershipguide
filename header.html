<header class="site-header">
  <main class="container">

    <nav class="nav" aria-label="Primary Navigation">

      <a href="/" class="logo site-brand" data-nav="home" aria-label="Ownership Guide home">
        <img src="/favicon-32x32.png" alt="" width="20" height="20" loading="eager" decoding="async"/>
        <span>Ownership Guide</span>
      </a>

      <a href="/start-here/" data-nav="start">
        Start Here
      </a>

      <a href="/calculators/" data-nav="calculators">
        Calculators
      </a>

      <a href="/comparisons/" data-nav="comparisons">
        Comparisons
      </a>

      <div class="nav-dropdown" id="nav-topics-dropdown">
        <button class="nav-dropdown-trigger" aria-haspopup="true" aria-expanded="false" aria-controls="nav-topics-menu" type="button">
          Topics <span class="nav-dropdown-arrow" aria-hidden="true">▾</span>
        </button>
        <div class="nav-dropdown-menu" id="nav-topics-menu" role="menu">
          <a href="/transport/" data-nav="transport" role="menuitem">Transport</a>
          <a href="/property/" data-nav="property" role="menuitem">Property</a>
          <a href="/family/" data-nav="family" role="menuitem">Family</a>
          <a href="/protection/" data-nav="protection" role="menuitem">Protection</a>
          <a href="/financing/" data-nav="financing" role="menuitem">Financing</a>
        </div>
      </div>

      <span class="nav-spacer" aria-hidden="true"></span>

      <div class="site-search" role="search" aria-label="Site search">
        <input
          id="og-site-search"
          type="search"
          placeholder="Search… (⌘K)"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search Ownership Guide"
          aria-keyshortcuts="Control+K Meta+K /"
          aria-controls="og-site-search-results"
          aria-expanded="false"
          aria-autocomplete="list"
        />
        <button id="og-site-search-clear" class="site-search-clear" type="button" aria-label="Clear search" title="Clear" hidden>×</button>
        <div id="og-site-search-results" class="site-search-results" role="listbox" aria-label="Search results" aria-live="polite"></div>
      </div>

    </nav>

  </main>

  <hr>
</header>

<script>
(function() {
  var dropdown = document.getElementById('nav-topics-dropdown');
  var trigger = dropdown && dropdown.querySelector('.nav-dropdown-trigger');
  var menu = document.getElementById('nav-topics-menu');
  if (!trigger || !menu) return;

  function openMenu() {
    trigger.setAttribute('aria-expanded', 'true');
    menu.classList.add('open');
  }
  function closeMenu() {
    trigger.setAttribute('aria-expanded', 'false');
    menu.classList.remove('open');
  }
  function toggleMenu() {
    if (menu.classList.contains('open')) { closeMenu(); } else { openMenu(); }
  }

  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleMenu();
  });

  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!dropdown.contains(e.target)) closeMenu();
  });

  // Close on Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeMenu();
  });

  // Highlight active cluster inside dropdown
  var path = (location.pathname || '/').toLowerCase();
  var clusterMap = {
    '/transport': 'transport', '/property': 'property',
    '/family': 'family', '/protection': 'protection', '/financing': 'financing'
  };
  Object.keys(clusterMap).forEach(function(prefix) {
    if (path.startsWith(prefix) || path.includes(clusterMap[prefix])) {
      var link = menu.querySelector('a[data-nav="' + clusterMap[prefix] + '"]');
      if (link) link.classList.add('active');
      trigger.classList.add('active');
    }
  });
})();
</script>
